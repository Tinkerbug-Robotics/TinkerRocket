name: Firmware Build (ESP-IDF)

on:
  push:
    paths:
      - 'tinkerrocket-idf/**'
  pull_request:
    paths:
      - 'tinkerrocket-idf/**'

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.2

    strategy:
      fail-fast: false
      matrix:
        project:
          - out_computer
          - base_station
          # flight_computer excluded: uses Arduino-as-component with
          # managed_components fetched at build time (gitignored).
          # Add once we set up component caching in CI.

    steps:
      - uses: actions/checkout@v4
        with:
          # TR_GuidancePN is a private submodule. Recurse only when the
          # TR_GUIDANCEPN_TOKEN repo secret is present. Without it, the
          # submodule is skipped and flight_computer's CMakeLists picks
          # up the TR_GuidancePN_Stub component instead (no-op API).
          submodules: ${{ secrets.TR_GUIDANCEPN_TOKEN != '' && 'recursive' || 'false' }}
          token: ${{ secrets.TR_GUIDANCEPN_TOKEN || github.token }}

      - name: Build ${{ matrix.project }}
        working-directory: tinkerrocket-idf/projects/${{ matrix.project }}
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py build
