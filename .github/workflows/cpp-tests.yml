name: C++ Unit Tests

on:
  push:
    paths:
      - 'tinkerrocket-idf/components/**'
      - 'libraries/**'        # transitional: test_guidance_pn still sources from here
      - 'tests_cpp/**'
      - 'tests/integration/**'
  pull_request:
    paths:
      - 'tinkerrocket-idf/components/**'
      - 'libraries/**'
      - 'tests_cpp/**'
      - 'tests/integration/**'

jobs:
  cpp-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S tests_cpp -B tests_cpp/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build tests_cpp/build -j$(nproc)

      - name: Test
        run: ctest --test-dir tests_cpp/build --output-on-failure

  bench-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run integration tests (skip if no test data)
        run: python -m pytest tests/integration/ -v --tb=short
