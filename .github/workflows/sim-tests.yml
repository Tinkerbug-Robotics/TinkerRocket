name: Simulation Tests (Python)

on:
  push:
    paths:
      - 'tinkerrocket-sim/**'
      - 'tinkerrocket-idf/components/TR_GpsInsEKF/**'
      - 'tinkerrocket-idf/components/TR_PID/**'
      - 'tinkerrocket-idf/components/TR_ControlMixer/**'
      - 'tinkerrocket-idf/components/TR_GuidancePN/**'
      - 'tests_cpp/host_shim/**'       # sim reuses the host_shim compat headers
      - 'tests/integration/**'
  pull_request:
    paths:
      - 'tinkerrocket-sim/**'
      - 'tinkerrocket-idf/components/**'
      - 'tests_cpp/host_shim/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # TR_GuidancePN is a private submodule. Recurse only when the
          # TR_GUIDANCEPN_TOKEN repo secret is present (trusted branches).
          # Forks / PRs without the secret skip the submodule; the
          # _guidance pybind11 extension is skipped in setup.py and the
          # test file uses pytest.importorskip to skip at test time.
          submodules: ${{ secrets.TR_GUIDANCEPN_TOKEN != '' && 'recursive' || 'false' }}
          token: ${{ secrets.TR_GUIDANCEPN_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pybind11 build deps
        run: pip install pybind11 setuptools

      - name: Install simulation package
        working-directory: tinkerrocket-sim
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: tinkerrocket-sim
        run: python -m pytest tests/ -v --tb=short
